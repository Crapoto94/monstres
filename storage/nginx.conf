# Sert les photos uploadées (volume partagé en lecture seule, écrit par le
# backend via ImageService). Correspond au sous-domaine img.monstres.fbc.fr
# (§12.2 : "recommandé", cache/CDN futur).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    autoindex off;

    location / {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }
}
