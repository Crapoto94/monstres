# Reverse proxy de façade — déploiement Proxmox uniquement.
# Domaine unique monstres.fbc.fr : l'API et les photos sont exposées sur des
# chemins (/api/, /uploads/) plutôt que des sous-domaines dédiés
# (api.monstres.fbc.fr, img.monstres.fbc.fr) — simplification V1 : seul
# monstres.fbc.fr est configuré en DNS/reverse-proxy externe pour l'instant
# (voir PROGRESS.md). TLS non géré ici : à terminer en amont (certbot ou
# reverse proxy déjà en place sur le Proxmox) avant mise en production.
#
# TODO : si api./img. sont ajoutés en DNS plus tard, on peut revenir à des
# server{} séparés par sous-domaine (voir historique git) sans changer les
# services backend/frontend/storage eux-mêmes.

server {
    listen 80;
    server_name monstres.fbc.fr;

    # Limite par défaut de nginx = 1 Mo, trop faible pour l'upload de photos
    # (jusqu'à 3 photos × 5 Mo, voir §7 et MAX_FILE_SIZE_BYTES côté backend).
    client_max_body_size 16m;

    # API NestJS — préfixe /api/v1 déjà géré côté backend, on transmet tel quel.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Photos (§7, §12.8) — servies par le conteneur `storage` depuis le
    # volume partagé avec le backend. Le préfixe /uploads/ est retiré avant
    # transmission (trailing slash sur proxy_pass).
    location /uploads/ {
        proxy_pass http://storage:80/;
        proxy_set_header Host $host;
    }

    # Frontend PWA (tout le reste).
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
