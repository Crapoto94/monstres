# Reverse proxy de façade — déploiement Proxmox uniquement.
# L'API et les photos sont exposées sur des chemins (/api/, /uploads/)
# plutôt que des sous-domaines dédiés (api.monstres.fbc.fr,
# img.monstres.fbc.fr) — simplification V1 (voir PROGRESS.md). TLS non géré
# ici : à terminer en amont (certbot ou reverse proxy déjà en place sur le
# Proxmox) avant mise en production.
#
# Plusieurs domaines (ex. monstres.fbc.fr ET monstres.app) peuvent pointer
# vers ce même serveur : listés explicitement dans `server_name` ci-dessous
# plutôt que de compter sur le comportement implicite de nginx (server par
# défaut pour un Host non reconnu). Ça marche pour n'importe quel domaine
# grâce au chemin API relatif côté frontend (VITE_API_URL) et au cookie de
# session "host-only" (JWT_COOKIE_DOMAIN vide, voir .env.example) — chaque
# domaine a sa propre session indépendante, aucun partage entre eux.
#
# TODO : si api./img. sont ajoutés en DNS plus tard, on peut revenir à des
# server{} séparés par sous-domaine (voir historique git) sans changer les
# services backend/frontend/storage eux-mêmes.

# Robots de partage (Facebook, WhatsApp, etc.) : n'exécutent pas le JS de la
# SPA, donc ne verraient aucune donnée par Monstre sur /monstres/:id. Ces
# User-Agent précis sont routés vers le backend (ShareController), qui leur
# sert une mini-page avec balises Open Graph (titre, adresse, photo) —
# tout le reste (vrais visiteurs) continue vers le frontend Vue normal.
map $http_user_agent $monstres_upstream {
    default "http://frontend:80";
    "~*facebookexternalhit|Facebot|WhatsApp|Twitterbot|LinkedInBot|TelegramBot|Slackbot|Discordbot|SkypeUriPreview|Pinterest" "http://backend:3000";
}

server {
    listen 80;
    server_name monstres.fbc.fr monstres.app;

    # Limite par défaut de nginx = 1 Mo, trop faible pour l'upload de photos
    # (jusqu'à 3 photos × 5 Mo, voir §7 et MAX_FILE_SIZE_BYTES côté backend).
    client_max_body_size 16m;

    # Fiche Monstre : routée dynamiquement frontend/backend selon le User-Agent
    # (voir map $monstres_upstream ci-dessus). Doit être déclarée avant le
    # `location /` générique pour être prioritaire.
    location ~ ^/monstres/ {
        proxy_pass $monstres_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API NestJS — préfixe /api/v1 déjà géré côté backend, on transmet tel quel.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Photos (§7, §12.8) — servies par le conteneur `storage` depuis le
    # volume partagé avec le backend. Le préfixe /uploads/ est retiré avant
    # transmission (trailing slash sur proxy_pass).
    location /uploads/ {
        proxy_pass http://storage:80/;
        proxy_set_header Host $host;
    }

    # Frontend PWA (tout le reste).
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
