# Reverse proxy de façade — déploiement Proxmox uniquement.
# Domaine racine fbc.fr, application sous monstres.fbc.fr (voir §12.2 du
# cahier des charges). TLS non géré ici : à terminer en amont (certbot ou
# reverse proxy existant sur le Proxmox) avant mise en production.
#
# TODO staging : dupliquer ces blocs pour staging.monstres.fbc.fr /
# api.staging.monstres.fbc.fr quand l'environnement de pré-production sera
# mis en place (§12.2, priorité "recommandé").

server {
    listen 80;
    server_name monstres.fbc.fr;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name api.monstres.fbc.fr;

    # Cookie d'auth JWT httpOnly partagé sur .monstres.fbc.fr : voir CLAUDE.md.
    location / {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name img.monstres.fbc.fr;

    location / {
        proxy_pass http://storage:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
